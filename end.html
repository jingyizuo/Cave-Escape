<!DOCTYPE html>
<html lang="en" class="end-shell" data-shell-fit=".container">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cave Escape — End</title>
  <link rel="stylesheet" href="styles/end.css">
</head>
<body>
  <div class="container">
    <h1 style="position: absolute; left: 50px; top: 90px; font-size: 40pt; width: 100%; color: white; line-height: 150%; font-family: verdana"><b>GROUP MEMBER</b></h1>
    <p style="position: absolute; left: 150px; top: 250px; font-size:12pt; color: white; padding: 2px 5px; font-family: courier;">
      <br><br>
      Jiani Liu<br>
      Jingyi Zuo<br>
      Weikang Yang<br>
    </p>
    <a class="button" href="start.html" role="button">RESTART</a>

    <div id="top"></div>
    <div id="bottom"></div>
  </div>

  <script src="js/shell-fit.js" defer></script>
  <script>
    function runEndScrollDemo() {
      document.getElementById( "bottom" ).scrollIntoView();
      window.setTimeout( () => document.getElementById( "top" ).scrollIntoView(), 2000 );
    }
    document.addEventListener( "DOMContentLoaded", runEndScrollDemo );
  </script>
